<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tuya Dashboard — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e4e6eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 400px; }
    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 1.5rem;
      opacity: 0.4;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.75rem; }
    h1 span { color: #4f8ff7; }
    p { color: #8b8f9a; font-size: 0.875rem; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      padding: 0.625rem 1.5rem;
      border-radius: 0.5rem;
      border: none;
      background: #4f8ff7;
      color: white;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <h1><span>Tuya</span> Dashboard</h1>
    <p>You appear to be offline. The dashboard needs a network connection to communicate with your Tuya devices.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
